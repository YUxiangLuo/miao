name: Build Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: public/

  build:
    runs-on: ubuntu-latest
    needs: frontend
    strategy:
      matrix:
        include:
          - target: amd64
            rust_target: x86_64-unknown-linux-musl
            goarch: amd64
          - target: arm64
            rust_target: aarch64-unknown-linux-musl
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: public/

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Clone sing-box source
        run: git clone --depth=1 https://github.com/SagerNet/sing-box.git sing-box-src

      - name: Determine required Go version
        id: go-version
        run: |
          GO_VERSION=$(grep '^go ' sing-box-src/go.mod | awk '{print $2}')
          echo "Required Go version: ${GO_VERSION}"
          echo "version=${GO_VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache-dependency-path: sing-box-src/go.sum

      - name: Install Zig for cross-compilation
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Build sing-box binary
        run: |
          mkdir -p embedded
          cd sing-box-src

          SING_BOX_VERSION=$(git describe --tags --always)
          echo "Building sing-box version: ${SING_BOX_VERSION}"

          GOARCH=${{ matrix.goarch }} GOOS=linux CGO_ENABLED=0 go build \
            -v \
            -trimpath \
            -ldflags "-s -w -buildid=" \
            -tags "with_quic,with_clash_api" \
            ./cmd/sing-box
          mv sing-box ../embedded/sing-box-${{ matrix.target }}

          cd ..
          rm -rf sing-box-src

          echo "Built sing-box ${SING_BOX_VERSION}"
          ls -lh embedded/

      - name: Download geo rule files
        run: |
          curl -L -o embedded/geoip-cn.srs https://raw.githubusercontent.com/SagerNet/sing-geoip/rule-set/geoip-cn.srs
          curl -L -o embedded/geosite-geolocation-cn.srs https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-geolocation-cn.srs
          echo "Downloaded geo rule files:"
          ls -lh embedded/*.srs

      - name: Build release for ${{ matrix.target }}
        run: cargo zigbuild --release --target ${{ matrix.rust_target }}

      - name: Prepare release asset
        run: |
          mv target/${{ matrix.rust_target }}/release/miao-rust miao-rust-linux-${{ matrix.target }}
          echo "RELEASE_ASSET=miao-rust-linux-${{ matrix.target }}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: miao-rust-${{ matrix.target }}
          path: ${{ env.RELEASE_ASSET }}

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.RELEASE_ASSET }}
